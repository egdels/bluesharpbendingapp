name: Build on Push

on:
  push:
    branches:
      - master

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/keystore.jks

    - name: Build Release APK and Bundle
      run: |
        ./gradlew assembleRelease bundleRelease \
        -PSIGNING_KEY_ALIAS="${SIGNING_KEY_ALIAS}" \
        -PSIGNING_KEY_PASSWORD="${SIGNING_KEY_PASSWORD}" \
        -PSIGNING_STORE_PASSWORD="${SIGNING_STORE_PASSWORD}"
      env:
        SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

    - name: Verify APK exists
      run: |
        ls -la android/app/build/outputs/apk/release/
        echo "APK verification completed"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LetsBend-APK
        path: android/app/build/outputs/apk/release/android-release.apk
        retention-days: 30

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: LetsBend-AAB
        path: android/app/build/outputs/bundle/release/android-release.aab
        retention-days: 30

    - name: Clean up keystore
      if: always()
      run: |
        rm -f android/keystore.jks
        echo "Keystore cleaned up"

  build-desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-latest, macos-15-large]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper

    - name: Grant execute permission for gradlew
      if: runner.os != 'Windows'
      run: chmod +x gradlew

    - name: Build Desktop Installer with jpackage
      if: runner.os != 'Linux'
      run: ./gradlew :desktop:jpackage
      env:
        GRADLE_OPTS: "-Dhttp.socketTimeout=30000 -Dhttp.connectionTimeout=30000"

    - name: Build Desktop Installer and AppImage (Linux)
      if: runner.os == 'Linux'
      run: ./gradlew :desktop:jpackage :desktop:jpackageAppImage
      env:
        GRADLE_OPTS: "-Dhttp.socketTimeout=30000 -Dhttp.connectionTimeout=30000"

    - name: Upload Desktop Installer
      uses: actions/upload-artifact@v4
      with:
        name: LetsBend-Desktop-${{ matrix.os }}
        path: desktop/build/jpackage/
        retention-days: 30

    - name: Create AppImage (Linux only)
      if: runner.os == 'Linux'
      run: |
        APP_VERSION=$(./gradlew -q :desktop:properties | grep '^version:' | awk '{print $2}')
        echo "Detected version: ${APP_VERSION}"
        chmod +x desktop/packaging/appimage/build-appimage.sh
        desktop/packaging/appimage/build-appimage.sh "${APP_VERSION}"
      env:
        GRADLE_OPTS: "-Dhttp.socketTimeout=30000 -Dhttp.connectionTimeout=30000"

    - name: List AppImage output (Linux only)
      if: runner.os == 'Linux'
      run: ls -la desktop/build/appimage-output/

    - name: Validate zsync file (Linux only)
      if: runner.os == 'Linux'
      run: |
        ZSYNC_FILE=$(ls desktop/build/appimage-output/*.zsync)
        APPIMAGE_FILE=$(ls desktop/build/appimage-output/*.AppImage)
        echo "=== zsync Header ==="
        head -10 "$ZSYNC_FILE"
        echo ""
        echo "=== Size check ==="
        ZSYNC_LENGTH=$(grep -a '^Length:' "$ZSYNC_FILE" | awk '{print $2}')
        ACTUAL_SIZE=$(stat --format=%s "$APPIMAGE_FILE")
        echo "zsync Length: $ZSYNC_LENGTH"
        echo "AppImage size: $ACTUAL_SIZE"
        if [ "$ZSYNC_LENGTH" = "$ACTUAL_SIZE" ]; then
          echo "✅ Size match"
        else
          echo "❌ Size mismatch!"
          exit 1
        fi
        echo ""
        echo "=== SHA-1 check ==="
        ZSYNC_SHA1=$(grep -a '^SHA-1:' "$ZSYNC_FILE" | awk '{print $2}')
        ACTUAL_SHA1=$(sha1sum "$APPIMAGE_FILE" | awk '{print $1}')
        echo "zsync SHA-1:  $ZSYNC_SHA1"
        echo "actual SHA-1: $ACTUAL_SHA1"
        if [ "$ZSYNC_SHA1" = "$ACTUAL_SHA1" ]; then
          echo "✅ SHA-1 match"
        else
          echo "❌ SHA-1 mismatch!"
          exit 1
        fi

    - name: Upload AppImage and zsync (Linux only)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: LetsBend-AppImage-${{ matrix.os }}
        path: desktop/build/appimage-output/
        retention-days: 30
