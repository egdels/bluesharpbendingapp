ort:
  analyzer:
    skipExcluded: true
    allowDynamicVersions: true
    disabledPackageManagers:
      - SBT
      - CocoaPods
      - PIP
      - NuGet
      - Bazel
  packageConfigurationProviders:
    - type: Dir
      options:
        path: ort/config/package-configurations
        mustExist: false
